<body>
<div id="wrap">
  <div id="screen">
    <!-- 480x320 internal resolution (game logic uses 240x160 via a 2x transform)
         so 32px source art renders at native detail -->
    <canvas id="game" width="480" height="320"></canvas>

    <!-- Battle HUD (info boxes) -->
    <div id="enemy-box" class="info-box hidden">
      <div class="ib-row1"><span class="ib-name"></span><span class="ib-lv"></span></div>
      <div class="ib-row2">
        <span class="ib-status"></span>
        <div class="hp-outer"><div class="hp-label">HP</div><div class="hp-track"><div class="hp-fill"></div></div></div>
      </div>
      <div class="ib-hpnum"></div>
      <div class="ib-balls"></div>
    </div>
    <div id="player-box" class="info-box hidden">
      <div class="ib-row1"><span class="ib-name"></span><span class="ib-lv"></span></div>
      <div class="ib-row2">
        <span class="ib-status"></span>
        <div class="hp-outer"><div class="hp-label">HP</div><div class="hp-track"><div class="hp-fill"></div></div></div>
      </div>
      <div class="ib-hpnum"></div>
      <div class="exp-track"><div class="exp-fill"></div></div>
    </div>

    <!-- Dialog box -->
    <div id="dialog" class="gba-box hidden">
      <div id="dialog-text"></div>
      <div id="dialog-arrow" class="hidden">&#9660;</div>
    </div>

    <!-- Dynamic menu layer (battle menu, moves, party, bag, shop, etc.) -->
    <div id="menu-layer"></div>

    <!-- Touch controls: overlaid INSIDE the game, mobile-RPG style -->
    <div id="touch-controls">
      <div id="dpad">
        <button data-k="up" id="tc-up">&#9650;</button>
        <button data-k="left" id="tc-left">&#9664;</button>
        <button data-k="right" id="tc-right">&#9654;</button>
        <button data-k="down" id="tc-down">&#9660;</button>
      </div>
      <div id="action-pad">
        <button data-k="start" id="tc-start">START</button>
        <button data-k="b" id="tc-b">B</button>
        <button data-k="a" id="tc-a">A</button>
      </div>
    </div>

    <!-- Fade overlay for transitions -->
    <div id="fade"></div>
  </div>
  <div id="hint">Z / SPACE = A &nbsp;&middot;&nbsp; X = B &nbsp;&middot;&nbsp; ENTER = MENU &nbsp;&middot;&nbsp; F = FULLSCREEN &nbsp;&middot;&nbsp; M = SOUND</div>
</div>

<!-- Portrait blocker for touch devices -->
<div id="rotate-overlay">
  <div>
    <div style="font-size:42px">&#128260;</div>
    <p>Please rotate your device</p>
    <p style="font-size:10px;opacity:.7">WILDVALE plays in landscape</p>
  </div>
</div>

<script src="js/audio.js"></script>

</body>
